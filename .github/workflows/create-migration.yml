name: create-migration
on:
  repository_dispatch:
    types: [create-migration]
jobs:
  migration:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
    permissions:
      contents: write
      pull-requests: write
    env:
      DB_HOST: mysql
    steps:
      - uses: actions/checkout@v4.1.0
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bundle exec rails db:create
